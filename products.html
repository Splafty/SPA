<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista produktów</title>
    <script src="https://unpkg.com/vue@3"></script>
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 8px;
            text-align: left;
            border: 1px solid #ddd;
        }
        th {
            background-color: #f2f2f2;
        }
        input {
            padding: 8px;
            margin-bottom: 10px;
            width: 200px;
        }
    </style>
</head>
<body>

<div id="app">
    <div>
        <label for="productFilter">Produkt:</label>
        <input v-model="filter" type="text" id="productFilter" placeholder="Szukaj po nazwie produktu">
    </div>

    <table>
        <thead>
            <tr>
                <th>Nazwa produktu</th>
                <th>Cena jednostkowa</th>
                <th>Ilość</th>
                <th>Wartość</th>
            </tr>
        </thead>
        <tbody>
            <tr v-for="product in filteredProducts()" :key="product.name">
                <td>{{ product.name }}</td>
                <td>{{ product.price.toFixed(2) }} zł</td>
                <td>{{ product.quantity }}</td>
                <td>{{ (product.price * product.quantity).toFixed(2) }} zł</td>
            </tr>
        </tbody>
    </table>
</div>

<script>
    Vue.createApp({
        data() {
            return {
                filter: '',
                products: [
                    { name: 'Laptop', price: 2999.99, quantity: 3 },
                    { name: 'Myszka', price: 89.99, quantity: 10 },
                    { name: 'Klawiatura', price: 199.99, quantity: 5 },
                    { name: 'Monitor', price: 899.99, quantity: 2 },
                    { name: 'Smartfon', price: 1499.99, quantity: 7 },
                    { name: 'Słuchawki', price: 499.99, quantity: 4 }
                ]
            };
        },
        methods: {
            filteredProducts() {
                return this.products.filter(product => 
                    product.name.toLowerCase().includes(this.filter.toLowerCase())
                );
            }
        }
    }).mount('#app');
</script>

</body>
</html>
