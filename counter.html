<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Licznik</title>
    <script src="https://unpkg.com/vue@3"></script>
</head>
<body>
    <h1>Licznik</h1>
    <p>Utwórz program counter.html wyświetlający przycisk wraz z informacją o liczbie jego kliknięć. Liczbę kliknięć wyświetl na przycisku. Kliknięcie przycisku prawym przyciskiem myszki zwiększa stan licznika kliknięć o 1, a kliknięcie lewym przyciskiem zmniejsza stan licznika o 1.</p>
    <div id="app">
        <button 
        @click="decrement()"
        @contextmenu.prevent="increment()">
            Licznik: {{ count }}
        </button>
    </div>

    <!-- Mount app -->
    <script>
        Vue.createApp ({
            data() {
                return {
                    count: 0
                }
            },
            methods: {
                increment() {
                    this.count++
                },
                decrement() {
                    this.count--
                }
            }
        }).mount('#app')
    </script>
</body>
</html>
